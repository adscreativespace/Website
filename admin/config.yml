backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["residential", "commercial", "interior", "institutional", "retail", "hospitality"] }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Area", name: "area", widget: "string", required: false, hint: "Example: 2,400 sq.ft" }
      - { label: "Year", name: "year", widget: "string", required: false, hint: "Example: 2024" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Full Description", name: "body", widget: "markdown", required: false }
      - label: "Project Images"
        name: "images"
        widget: "list"
        field: { label: "Image", name: "image", widget: "image" }
      - label: "Card Thumbnail"
        name: "thumbnail"
        widget: "image"
        required: false
