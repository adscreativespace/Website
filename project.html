<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details | ADS Creative Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <!-- YAML Parser to cleanly read admin data -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  
  <style>
    /* PAGE SPECIFIC CSS TO MATCH YOUR DESIGN EXACTLY */
    body { background-color: #fff; }
    .playfair { font-family: 'Playfair Display', serif; }
    .gold { color: #C59D5F; }
    .bg-light { background-color: #F8F7F3; }
    
    /* Hero Section */
    .hero-split {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      background-color: #F8F7F3;
      min-height: 80vh;
    }
    .hero-text {
      padding: 100px 12%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #C59D5F;
      font-size: 0.9rem;
      text-decoration: none;
      margin-bottom: 40px;
      font-weight: 500;
    }
    .hero-text h1 {
      font-size: 3.5rem;
      line-height: 1.1;
      color: #111;
      margin-bottom: 10px;
    }
    .hero-text h3 {
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 30px;
    }
    .hero-text p {
      color: #555;
      line-height: 1.8;
      font-size: 1rem;
      max-width: 90%;
    }
    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Stats Bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      border-bottom: 1px solid #EAEAEA;
      background: #fff;
      padding: 40px 5%;
      text-align: center;
      gap: 20px;
    }
    .stat-item i {
      font-size: 1.5rem;
      color: #C59D5F;
      margin-bottom: 15px;
    }
    .stat-item h5 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #111;
      margin-bottom: 8px;
    }
    .stat-item p {
      font-size: 0.9rem;
      color: #666;
    }

    /* Content Layouts */
    .section-wrap {
      max-width: 1200px;
      margin: 80px auto;
      padding: 0 5%;
    }
    .about-grid, .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 60px;
      align-items: center;
    }
    .feature-grid.reverse {
      grid-template-columns: 1.5fr 1fr;
    }
    .section-title {
      font-size: 0.85rem;
      color: #C59D5F;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .text-content {
      color: #555;
      line-height: 1.8;
      font-size: 1rem;
    }
    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Highlights */
    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 30px;
      padding: 40px 5%;
      background: #FDFDFD;
      border-top: 1px solid #EAEAEA;
      border-bottom: 1px solid #EAEAEA;
      margin: 60px 0;
    }
    .highlight-card i {
      font-size: 1.5rem;
      color: #111;
      margin-bottom: 20px;
    }
    .highlight-card h4 {
      font-size: 0.95rem;
      margin-bottom: 10px;
      color: #111;
    }
    .highlight-card p {
      font-size: 0.85rem;
      color: #666;
      line-height: 1.6;
    }

    /* Gallery */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 100px;
    }
    .gallery-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
    }

    /* Related Projects */
    .related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }
    .related-card {
      border: 1px solid #EAEAEA;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
    }
    .related-card img {
      width: 120px;
      height: 120px;
      object-fit: cover;
    }
    .related-info {
      padding: 20px;
    }
    .related-info h4 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 8px; }
    .related-info p { font-size: 0.8rem; color: #888; margin-bottom: 12px; }
    .related-info span { font-size: 0.85rem; font-weight: 600; color: #111; }

    @media (max-width: 900px) {
      .hero-split, .about-grid, .feature-grid, .feature-grid.reverse { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .highlights-grid { grid-template-columns: repeat(2, 1fr); }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .related-grid { grid-template-columns: 1fr; }
      .hero-text { padding: 60px 5%; }
      .hero-text h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="logo">
      <img src="logo.png" alt="ADS Creative Space" style="height: 52px;">
    </a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html" class="active">Projects</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Content Container injected by JS -->
  <div id="project-app">
    <div style="padding: 100px; text-align: center; color: #888;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
  </div>

  <!-- Footer -->
  <footer class="advanced-footer">
    <div class="footer-grid">
        <div class="f-col">
            <a href="index.html"><img src="logo.png" alt="ADS" style="height:48px; filter:brightness(0) invert(1);"></a>
            <p style="margin-top:16px;">Architecture and interior design consultancy creating timeless spaces that inspire.</p>
        </div>
        <div class="f-col contact-col">
            <h4>Contact Us</h4>
            <p><i class="fa-solid fa-phone"></i> +91 70030 71858</p>
            <p><i class="fa-solid fa-envelope"></i> adscreativespace@gmail.com</p>
        </div>
    </div>
  </footer>

  <script>
    async function initProjectPage() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const app = document.getElementById('project-app');
      
      if (!slug) { app.innerHTML = '<h2 style="padding:100px;text-align:center;">Project not found.</h2>'; return; }

      try {
        const apiUrl = 'https://api.github.com/repos/adscreativespace/Website/contents/projects';
        const res = await fetch(apiUrl);
        const files = await res.json();
        
        let projects = [];
        let currentProject = null;

        for (const file of files.filter(f => f.name.endsWith('.md'))) {
          const r = await fetch(file.download_url);
          const rawText = await r.text();
          
          const parts = rawText.split('---');
          if (parts.length < 3) continue;
          
          // Use js-yaml to perfectly extract data
          const data = jsyaml.load(parts[1]);
          data.slug = file.name.replace('.md', '');
          data.body = parts.slice(2).join('---').trim();
          
          // Fix image paths
          if (data.thumbnail && data.thumbnail.startsWith('/')) data.thumbnail = data.thumbnail.slice(1);
          if (data.about_image && data.about_image.startsWith('/')) data.about_image = data.about_image.slice(1);
          if (data.f1_image && data.f1_image.startsWith('/')) data.f1_image = data.f1_image.slice(1);
          if (data.f2_image && data.f2_image.startsWith('/')) data.f2_image = data.f2_image.slice(1);
          if (data.images) {
             data.images = data.images.map(img => img.startsWith('/') ? img.slice(1) : img);
          }

          projects.push(data);
          if (data.slug === slug) currentProject = data;
        }

        if (!currentProject) { app.innerHTML = '<h2 style="padding:100px;text-align:center;">Project not found.</h2>'; return; }

        // Get up to 3 other projects for "Related Projects"
        const related = projects.filter(p => p.slug !== slug).slice(0, 3);

        // Build HTML
        let html = `
          <!-- HERO -->
          <div class="hero-split">
            <div class="hero-text">
              <a href="projects.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Projects</a>
              <h1 class="playfair">${currentProject.title || 'Project'}</h1>
              ${currentProject.subtitle ? `<h3 class="playfair gold">${currentProject.subtitle}</h3>` : ''}
              <p>${currentProject.description || ''}</p>
            </div>
            ${currentProject.thumbnail ? `<img src="${currentProject.thumbnail}" class="hero-img">` : '<div class="bg-light"></div>'}
          </div>

          <!-- STATS BAR -->
          <div class="stats-bar">
            <div class="stat-item"><i class="fa-solid fa-location-dot"></i><h5>Location</h5><p>${currentProject.location || '—'}</p></div>
            <div class="stat-item"><i class="fa-regular fa-square"></i><h5>Area</h5><p>${currentProject.area || '—'}</p></div>
            <div class="stat-item"><i class="fa-solid fa-building"></i><h5>Project Type</h5><p>${currentProject.category || '—'}</p></div>
            <div class="stat-item"><i class="fa-solid fa-pen-ruler"></i><h5>Design Style</h5><p>${currentProject.style || '—'}</p></div>
            <div class="stat-item"><i class="fa-regular fa-calendar"></i><h5>Year</h5><p>${currentProject.year || '—'}</p></div>
            <div class="stat-item"><i class="fa-regular fa-user"></i><h5>Client</h5><p>${currentProject.client || '—'}</p></div>
          </div>
        `;

        // ABOUT SECTION
        if (currentProject.body || currentProject.about_image) {
          html += `
          <div class="section-wrap">
            <div class="about-grid">
              <div class="text-content">
                <div class="section-title">About The Project</div>
                ${currentProject.body ? currentProject.body.replace(/\n/g, '<br>') : ''}
              </div>
              ${currentProject.about_image ? `<div class="img-wrap"><img src="${currentProject.about_image}"></div>` : ''}
            </div>
          </div>
          `;
        }

        // FEATURE 1
        if (currentProject.f1_title || currentProject.f1_image) {
          html += `
          <div class="section-wrap" style="margin-top:0;">
            <div class="feature-grid reverse">
              ${currentProject.f1_image ? `<div class="img-wrap"><img src="${currentProject.f1_image}"></div>` : '<div></div>'}
              <div class="text-content" style="padding: 40px; background: #F8F7F3;">
                <h4 class="playfair" style="font-size:1.4rem; color:#C59D5F; margin-bottom:15px;">${currentProject.f1_title || ''}</h4>
                <p>${currentProject.f1_text || ''}</p>
              </div>
            </div>
          </div>
          `;
        }

        // FEATURE 2
        if (currentProject.f2_title || currentProject.f2_image) {
          html += `
          <div class="section-wrap" style="margin-top:0;">
            <div class="feature-grid">
              <div class="text-content" style="padding: 40px; background: #F8F7F3;">
                <h4 class="playfair" style="font-size:1.4rem; color:#C59D5F; margin-bottom:15px;">${currentProject.f2_title || ''}</h4>
                <p>${currentProject.f2_text || ''}</p>
              </div>
              ${currentProject.f2_image ? `<div class="img-wrap"><img src="${currentProject.f2_image}"></div>` : '<div></div>'}
            </div>
          </div>
          `;
        }

        // HIGHLIGHTS
        if (currentProject.highlights && currentProject.highlights.length > 0) {
          html += `
          <div class="section-wrap" style="max-width: 100%; padding:0; margin-bottom:0;">
             <div class="section-title" style="padding-left:5%;">Design Highlights</div>
             <div class="highlights-grid">
               ${currentProject.highlights.map(h => `
                 <div class="highlight-card">
                   <i class="fa-regular fa-star"></i>
                   <h4>${h.title || ''}</h4>
                   <p>${h.text || ''}</p>
                 </div>
               `).join('')}
             </div>
          </div>
          `;
        }

        // GALLERY
        if (currentProject.images && currentProject.images.length > 0) {
          html += `
          <div class="section-wrap">
            <div class="section-title">Project Gallery</div>
            <div class="gallery-grid">
              ${currentProject.images.map(img => `<img src="${img}">`).join('')}
            </div>
          </div>
          `;
        }

        // RELATED PROJECTS
        if (related.length > 0) {
          html += `
          <div class="section-wrap">
            <div class="section-title" style="margin-top:60px; border-top: 1px solid #eaeaea; padding-top:40px;">Related Projects</div>
            <div class="related-grid">
              ${related.map(p => `
                <a href="project.html?slug=${p.slug}" class="related-card">
                  <img src="${p.thumbnail || p.images?.[0] || ''}" onerror="this.src='https://placehold.co/200?text=No+Img'">
                  <div class="related-info">
                    <h4>${p.title}</h4>
                    <p>${p.category}</p>
                    <span>View Project &rarr;</span>
                  </div>
                </a>
              `).join('')}
            </div>
          </div>
          `;
        }

        app.innerHTML = html;

      } catch (err) {
        app.innerHTML = '<h2 style="padding:100px;text-align:center;color:red;">Error loading layout data.</h2>';
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', initProjectPage);
  </script>

</body>
</html>
