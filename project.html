<!DOCTYPE html>

<style> body { background: #fff; font-family: 'Montserrat', sans-serif; color: #2A2A2A; }

/\* HERO \*/
.pd\-hero \{
  display: grid;
  grid\-template\-columns: 1fr 1.3fr;
  min\-height: 85vh;
  background: \#F8F7F3;
\}

.pd\-hero\-left \{
  padding: 120px 8% 80px;
  display: flex;
  flex\-direction: column;
  justify\-content: center;
\}

.pd\-back \{
  display: inline\-flex;
  align\-items: center;
  gap: 8px;
  color: \#C59D5F;
  text\-decoration: none;
  font\-size: 0.85rem;
  font\-weight: 500;
  letter\-spacing: 0.5px;
  margin\-bottom: 50px;
\}

.pd\-hero\-left h1 \{
  font\-family: 'Playfair Display', serif;
  font\-size: 3.6rem;
  line\-height: 1.1;
  color: \#111;
  margin: 0 0 12px 0;
\}

.pd\-hero\-subtitle \{
  font\-family: 'Playfair Display', serif;
  font\-size: 1.5rem;
  color: \#C59D5F;
  margin\-bottom: 30px;
\}

.pd\-hero\-desc \{
  font\-size: 0.95rem;
  line\-height: 1.8;
  color: \#666;
  max\-width: 85%;
\}

.pd\-hero\-right img \{
  width: 100%;
  height: 100%;
  object\-fit: cover;
  display: block;
\}

/\* STATS BAR \*/
.pd\-stats \{
  display: grid;
  grid\-template\-columns: repeat\(6, 1fr\);
  text\-align: center;
  padding: 40px 4%;
  background: \#fff;
  border\-bottom: 1px solid \#EAEAEA;
  gap: 10px;
\}

.pd\-stat i \{
  font\-size: 1.4rem;
  color: \#C59D5F;
  margin\-bottom: 12px;
  display: block;
\}

.pd\-stat\-label \{
  font\-size: 0.72rem;
  text\-transform: uppercase;
  letter\-spacing: 1px;
  color: \#111;
  font\-weight: 600;
  margin\-bottom: 6px;
\}

.pd\-stat\-val \{
  font\-size: 0.88rem;
  color: \#555;
\}

/\* ABOUT \*/
.pd\-about \{
  display: grid;
  grid\-template\-columns: 1fr 1.5fr;
  gap: 60px;
  align\-items: center;
  padding: 80px 6%;
  max\-width: 1300px;
  margin: 0 auto;
\}

.pd\-section\-label \{
  font\-size: 0.8rem;
  color: \#C59D5F;
  text\-transform: uppercase;
  letter\-spacing: 2px;
  font\-weight: 600;
  margin\-bottom: 24px;
\}

.pd\-body\-text \{
  font\-size: 0.95rem;
  line\-height: 1.9;
  color: \#555;
\}

/\* JUSTIFY first paragraph under About \*/
.pd\-body\-text p:first\-child \{
  text\-align: justify;
\}

.pd\-about\-img img \{
  width: 100%;
  height: auto;
  display: block;
\}

/\* FEATURES \*/
.pd\-feature \{
  display: grid;
  grid\-template\-columns: 1.2fr 1fr;
  align\-items: center;
  padding: 0 6% 80px;
  max\-width: 1300px;
  margin: 0 auto;
  gap: 60px;
\}

.pd\-feature.flip \{
  grid\-template\-columns: 1fr 1.2fr;
\}

.pd\-feature img \{
  width: 100%;
  height: auto;
  display: block;
\}

.pd\-feature\-text\-wrap \{ padding: 20px 0; \}

.pd\-feature\-icon \{
  width: 48px;
  height: 48px;
  border\-radius: 50%;
  background: \#4B5A51;
  color: \#fff;
  display: flex;
  align\-items: center;
  justify\-content: center;
  font\-size: 1.1rem;
  margin\-bottom: 20px;
\}

.pd\-feature\-title \{
  font\-size: 1rem;
  color: \#C59D5F;
  font\-weight: 600;
  text\-transform: uppercase;
  letter\-spacing: 1px;
  margin\-bottom: 15px;
\}

.pd\-feature\-desc \{
  font\-size: 0.95rem;
  color: \#555;
  line\-height: 1.8;
\}

/\* HIGHLIGHTS \*/
.pd\-highlights \{
  background: \#F8F7F3;
  padding: 60px 6%;
\}

.pd\-hl\-grid \{
  display: grid;
  grid\-template\-columns: repeat\(3, 1fr\);
  gap: 30px;
  margin\-top: 30px;
  max\-width: 1300px;
  margin\-left: auto;
  margin\-right: auto;
\}

.pd\-hl\-item i \{
  font\-size: 1.5rem;
  color: \#111;
  margin\-bottom: 15px;
  display: block;
\}

.pd\-hl\-title \{
  font\-size: 0.9rem;
  font\-weight: 700;
  color: \#111;
  margin\-bottom: 8px;
\}

.pd\-hl\-text \{
  font\-size: 0.82rem;
  color: \#666;
  line\-height: 1.6;
  text\-align: justify;
\}

/\* GALLERY: show all images using auto\-fit \*/
.pd\-gallery \{
  padding: 60px 6%;
  max\-width: 1300px;
  margin: 0 auto;
\}

.pd\-gal\-grid \{
  display: grid;
  grid\-template\-columns: repeat\(auto\-fit, minmax\(260px, 1fr\)\);
  gap: 18px;
  margin\-top: 25px;
\}

.pd\-gal\-grid img \{
  width: 100%;
  aspect\-ratio: 4/3;
  object\-fit: cover;
  display: block;
  border\-radius: 4px;
\}

/\* PROJECT NAV \*/
.pd\-project\-nav \{
  max\-width: 1300px;
  margin: 20px auto 60px;
  padding: 0 6%;
  display: flex;
  justify\-content: space\-between;
  gap: 20px;
\}

.pd\-project\-nav a \{
  flex: 1;
  text\-decoration: none;
  border: 1px solid \#E5E5E5;
  padding: 18px 20px;
  color: \#111;
  transition: 0.3s;
  background: \#fff;
\}

.pd\-project\-nav a:hover \{
  border\-color: \#C59D5F;
  color: \#C59D5F;
\}

.pd\-project\-nav small \{
  display: block;
  font\-size: 0.75rem;
  text\-transform: uppercase;
  color: \#999;
  margin\-bottom: 6px;
  letter\-spacing: 1px;
\}

.pd\-project\-nav strong \{
  display: block;
  font\-size: 1rem;
  font\-weight: 600;
  line\-height: 1.5;
\}

/\* RELATED \*/
.pd\-related \{
  padding: 60px 6% 100px;
  background: \#F8F7F3;
\}

.pd\-related\-grid \{
  display: grid;
  grid\-template\-columns: repeat\(3, 1fr\);
  gap: 30px;
  margin\-top: 25px;
  max\-width: 1300px;
  margin\-left: auto;
  margin\-right: auto;
\}

.rel\-card \{
  background: \#fff;
  text\-decoration: none;
  color: inherit;
  display: flex;
  border: 1px solid \#EAEAEA;
  transition: transform 0.3s;
\}

.rel\-card:hover \{ transform: translateY\(\-5px\); \}
.rel\-card img \{ width: 130px; height: 130px; object\-fit: cover; flex\-shrink: 0; \}
.rel\-info \{ padding: 20px; display: flex; flex\-direction: column; justify\-content: center; \}
.rel\-title \{ font\-family: 'Playfair Display', serif; font\-size: 1.05rem; margin\-bottom: 6px; color: \#111; \}
.rel\-cat \{ font\-size: 0.75rem; color: \#888; margin\-bottom: 14px; text\-transform: uppercase; \}
.rel\-link \{ font\-size: 0.82rem; font\-weight: 600; color: \#111; \}

/\* Footer first paragraph justify \*/
.advanced\-footer .f\-col p:first\-of\-type \{ text\-align: justify; \}

/\* RESPONSIVE \*/
@media \(max\-width: 960px\) \{
  .pd\-hero, .pd\-about, .pd\-feature, .pd\-feature.flip \{ grid\-template\-columns: 1fr; \}
  .pd\-hero\-right \{ min\-height: 350px; \}
  .pd\-hero\-right img \{ height: 350px; \}
  .pd\-stats \{ grid\-template\-columns: repeat\(3, 1fr\); gap: 20px; \}
  .pd\-hl\-grid \{ grid\-template\-columns: repeat\(3, 1fr\); \}
  .pd\-gal\-grid \{ grid\-template\-columns: repeat\(2, 1fr\); \}
  .pd\-related\-grid \{ grid\-template\-columns: 1fr; \}
  .pd\-hero\-left h1 \{ font\-size: 2.4rem; \}
\}
@media \(max\-width: 560px\) \{
  .pd\-stats \{ grid\-template\-columns: repeat\(2, 1fr\); \}
  .pd\-hl\-grid \{ grid\-template\-columns: repeat\(2, 1fr\); \}
  .pd\-gal\-grid \{ grid\-template\-columns: 1fr; \}
\}

<!-- WHATSAPP --> <a href="https://wa.me/917003071858?text=Hello%20ADS%20Creative%20Space%2C%20I%20am%20interested%20in%20your%20services." class="whatsapp-float" target="_blank"> <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp"> </a>

<script> // helper to normalize image paths function img(path) { if (!path) return ''; path = String(path).trim(); return path.startsWith('/') ? path.slice(1) : path; }

const hlIcons = \['fa\-palette','fa\-bed','fa\-door\-closed','fa\-lightbulb','fa\-chair','fa\-gem'\];

async function loadPage\(\) \{
  const root = document.getElementById\('pd\-root'\);
  const slug = new URLSearchParams\(window.location.search\).get\('slug'\);

  if \(\!slug\) \{
    root.innerHTML = '<div style="padding:100px;text\-align:center;"\>Project not found.</div\>';
    return;
  \}

  try \{
    const apiUrl = 'https://api.github.com/repos/adscreativespace/Website/contents/projects';
    const res = await fetch\(apiUrl\);
    const files = await res.json\(\);
    const mdFiles = files.filter\(f =\> f.name.endsWith\('.md'\)\);

    let allProjects = \[\];
    let current = null;

    for \(const file of mdFiles\) \{
      const r = await fetch\(file.download\_url\);
      const raw = await r.text\(\);
      const fileSlug = file.name.replace\('.md', ''\);

      // split frontmatter
      const sections = raw.split\(/^\-\-\-\\s\*$/m\);
      let data = \{\};
      let bodyMd = '';
      if \(sections.length \>= 3\) \{
        try \{ data = jsyaml.load\(sections\[1\]\) \|\| \{\}; \} catch\(e\) \{ data = \{\}; \}
        bodyMd = sections.slice\(2\).join\('\-\-\-'\).trim\(\);
      \}

      data.slug = fileSlug;
      data.\_body = bodyMd;

      // Normalize lists like images that might be list of objects or strings
      if \(Array.isArray\(data.images\)\) \{
        // leave as\-is
      \}

      allProjects.push\(data\);
      if \(fileSlug === slug\) current = data;
    \}

    if \(\!current\) \{
      root.innerHTML = '<div style="padding:100px;text\-align:center;"\>Project not found.</div\>';
      return;
    \}

    // sort for consistent prev/next \(by filename slug\)
    allProjects.sort\(\(a,b\) =\> a.slug.localeCompare\(b.slug\)\);
    const currentIndex = allProjects.findIndex\(p =\> p.slug === slug\);
    const prevProject = currentIndex \> 0 ? allProjects\[currentIndex \- 1\] : null;
    const nextProject = currentIndex < allProjects.length \- 1 ? allProjects\[currentIndex \+ 1\] : null;

    // hero image priority: hero\_image \-\> thumbnail \-\> first gallery image
    const heroSrc = img\(current.hero\_image\) \|\| img\(current.thumbnail\) \|\| \(current.images && current.images.length ? img\(current.images\[0\].image \|\| current.images\[0\]\) : ''\);
    const aboutSrc = img\(current.about\_image\) \|\| \(current.images && current.images.length \> 1 ? img\(current.images\[1\].image \|\| current.images\[1\]\) : ''\);

    const bodyHtml = current.\_body ? current.\_body.replace\(/\\n\\n/g, '</p\><p\>'\).replace\(/\\n/g, '<br\>'\) : \(current.description \|\| ''\);

    // all gallery images
    const galleryImgs = \(current.images \|\| \[\]\).map\(g =\> img\(g.image \|\| g\)\).filter\(Boolean\);

    // related projects \(auto from other projects\)
    const related = allProjects.filter\(p =\> p.slug \!== slug\).slice\(0,3\);

    let html = '';

    // HERO
    html \+= \`
      <div class="pd\-hero"\>
        <div class="pd\-hero\-left"\>
          <a href="projects.html" class="pd\-back"\><i class="fa\-solid fa\-arrow\-left"\></i\> Back to Projects</a\>
          <h1\>$\{current.title \|\| 'Project'\}</h1\>
          $\{current.subtitle ? \`<div class="pd\-hero\-subtitle"\>$\{current.subtitle\}</div\>\` : ''\}
          <p class="pd\-hero\-desc"\>$\{current.description \|\| ''\}</p\>
        </div\>
        <div class="pd\-hero\-right"\>
          $\{heroSrc ? \`<img src="$\{heroSrc\}" alt="$\{current.title \|\| 'Project'\}"\>\` : '<div style="background:\#eee;width:100%;height:100%;"\></div\>'\}
        </div\>
      </div\>
    \`;

    // STATS
    html \+= \`
      <div class="pd\-stats"\>
        <div class="pd\-stat"\><i class="fa\-solid fa\-location\-dot"\></i\><div class="pd\-stat\-label"\>Location</div\><div class="pd\-stat\-val"\>$\{current.location \|\| '—'\}</div\></div\>
        <div class="pd\-stat"\><i class="fa\-solid fa\-vector\-square"\></i\><div class="pd\-stat\-label"\>Area</div\><div class="pd\-stat\-val"\>$\{current.area \|\| '—'\}</div\></div\>
        <div class="pd\-stat"\><i class="fa\-solid fa\-building"\></i\><div class="pd\-stat\-label"\>Project Type</div\><div class="pd\-stat\-val"\>$\{current.category \|\| '—'\}</div\></div\>
        <div class="pd\-stat"\><i class="fa\-solid fa\-compass\-drafting"\></i\><div class="pd\-stat\-label"\>Design Style</div\><div class="pd\-stat\-val"\>$\{current.style \|\| '—'\}</div\></div\>
        <div class="pd\-stat"\><i class="fa\-regular fa\-calendar"\></i\><div class="pd\-stat\-label"\>Year</div\><div class="pd\-stat\-val"\>$\{current.year \|\| '—'\}</div\></div\>
        <div class="pd\-stat"\><i class="fa\-regular fa\-user"\></i\><div class="pd\-stat\-label"\>Client</div\><div class="pd\-stat\-val"\>$\{current.client \|\| '—'\}</div\></div\>
      </div\>
    \`;

    // ABOUT
    html \+= \`
      <div class="pd\-about"\>
        <div\>
          <div class="pd\-section\-label"\>About The Project</div\>
          <div class="pd\-body\-text"\><p\>$\{bodyHtml\}</p\></div\>
        </div\>
        <div class="pd\-about\-img"\>
          $\{aboutSrc ? \`<img src="$\{aboutSrc\}" alt="Project Image"\>\` : ''\}
        </div\>
      </div\>
    \`;

    // FEATURE 1
    if \(current.f1\_title \|\| current.f1\_image \|\| current.f1\_text\) \{
      html \+= \`
        <div class="pd\-feature" style="padding\-top:0;"\>
          <div\>$\{current.f1\_image ? \`<img src="$\{img\(current.f1\_image\)\}" alt="$\{current.f1\_title \|\| ''\}"\>\` : ''\}</div\>
          <div class="pd\-feature\-text\-wrap"\>
            <div class="pd\-feature\-icon"\><i class="fa\-solid fa\-layer\-group"\></i\></div\>
            <div class="pd\-feature\-title"\>$\{current.f1\_title \|\| ''\}</div\>
            <div class="pd\-feature\-desc"\>$\{current.f1\_text \|\| ''\}</div\>
          </div\>
        </div\>
      \`;
    \}

    // FEATURE 2
    if \(current.f2\_title \|\| current.f2\_image \|\| current.f2\_text\) \{
      html \+= \`
        <div class="pd\-feature flip" style="padding\-top:0;"\>
          <div class="pd\-feature\-text\-wrap"\>
            <div class="pd\-feature\-icon"\><i class="fa\-solid fa\-couch"\></i\></div\>
            <div class="pd\-feature\-title"\>$\{current.f2\_title \|\| ''\}</div\>
            <div class="pd\-feature\-desc"\>$\{current.f2\_text \|\| ''\}</div\>
          </div\>
          <div\>$\{current.f2\_image ? \`<img src="$\{img\(current.f2\_image\)\}" alt="$\{current.f2\_title \|\| ''\}"\>\` : ''\}</div\>
        </div\>
      \`;
    \}

    // HIGHLIGHTS
    if \(current.highlights && current.highlights.length \> 0\) \{
      html \+= \`
        <div class="pd\-highlights"\>
          <div class="pd\-section\-label" style="max\-width:1300px;margin:0 auto 0;"\>Design Highlights</div\>
          <div class="pd\-hl\-grid"\>
            $\{current.highlights.map\(\(h,i\) =\> \`
              <div class="pd\-hl\-item"\>
                <i class="fa\-solid $\{hlIcons\[i % hlIcons.length\]\}"\></i\>
                <div class="pd\-hl\-title"\>$\{h.title \|\| ''\}</div\>
                <div class="pd\-hl\-text"\>$\{h.text \|\| ''\}</div\>
              </div\>
            \`\).join\(''\)\}
          </div\>
        </div\>
      \`;
    \}

    // GALLERY \(all images\)
    if \(galleryImgs.length \> 0\) \{
      html \+= \`
        <div class="pd\-gallery"\>
          <div class="pd\-section\-label"\>Project Gallery</div\>
          <div class="pd\-gal\-grid"\>
            $\{galleryImgs.map\(src =\> \`<img src="$\{src\}" alt="Gallery Image"\>\`\).join\(''\)\}
          </div\>
        </div\>
      \`;
    \}

    // PREV / NEXT NAV
    if \(prevProject \|\| nextProject\) \{
      html \+= \`
        <div class="pd\-project\-nav"\>
          $\{prevProject ? \`
            <a href="project.html?slug=$\{prevProject.slug\}"\>
              <small\>Previous Project</small\>
              <strong\>← $\{prevProject.title \|\| 'Project'\}</strong\>
            </a\>
          \` : \`<div\></div\>\`\}

          $\{nextProject ? \`
            <a href="project.html?slug=$\{nextProject.slug\}" style="text\-align:right;"\>
              <small\>Next Project</small\>
              <strong\>$\{nextProject.title \|\| 'Project'\} →</strong\>
            </a\>
          \` : \`<div\></div\>\`\}
        </div\>
      \`;
    \}

    // RELATED PROJECTS \(auto\)
    if \(related.length \> 0\) \{
      html \+= \`
        <div class="pd\-related"\>
          <div class="pd\-section\-label" style="max\-width:1300px;margin:0 auto 25px;"\>Related Projects</div\>
          <div class="pd\-related\-grid"\>
            $\{related.map\(p =\> \{
              const rImg = img\(p.thumbnail\) \|\| img\(p.hero\_image\) \|\| \(p.images && p.images\[0\] ? img\(p.images\[0\].image \|\| p.images\[0\]\) : ''\);
              return \`
                <a href="project.html?slug=$\{p.slug\}" class="rel\-card"\>
                  $\{rImg ? \`<img src="$\{rImg\}" alt="$\{p.title \|\| 'Project'\}"\>\` : '<div style="width:130px;height:130px;background:\#eee;"\></div\>'\}
                  <div class="rel\-info"\>
                    <div class="rel\-title"\>$\{p.title \|\| 'Project'\}</div\>
                    <div class="rel\-cat"\>$\{p.category \|\| 'Interior'\}</div\>
                    <div class="rel\-link"\>View Project →</div\>
                  </div\>
                </a\>
              \`;
            \}\).join\(''\)\}
          </div\>
        </div\>
      \`;
    \}

    root.innerHTML = html;

  \} catch \(err\) \{
    console.error\(err\);
    root.innerHTML = '<div style="padding:100px;text\-align:center;color:red;"\>Error loading project. Please try again.</div\>';
  \}
\}

document.addEventListener\('DOMContentLoaded', loadPage\);

</script> </body> </html>
